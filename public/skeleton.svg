 <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- animated skeleton gradient -->
            <linearGradient id="shimmer" x1="-100%" y1="0%" x2="200%" y2="0%">
              <stop offset="0%" stop-color="#1f2937" />
              <stop offset="50%" stop-color="#374151" />
              <stop offset="100%" stop-color="#1f2937" />
              <animate attributeName="x1" from="-100%" to="200%" dur="2s" repeatCount="indefinite" />
              <animate attributeName="x2" from="0%" to="300%" dur="2s" repeatCount="indefinite" />
            </linearGradient>
          </defs>

          <!-- background -->
          <rect width="200" height="200" rx="18" fill="#0b1220" />

          <!-- chart grid -->
          <g stroke="#1e293b" stroke-width="1">
            <line x1="30" y1="50" x2="170" y2="50" />
            <line x1="30" y1="80" x2="170" y2="80" />
            <line x1="30" y1="110" x2="170" y2="110" />
            <line x1="30" y1="140" x2="170" y2="140" />

            <line x1="50" y1="35" x2="50" y2="160" />
            <line x1="90" y1="35" x2="90" y2="160" />
            <line x1="130" y1="35" x2="130" y2="160" />
          </g>

          <!-- loading chart bars -->
          <rect x="42" y="100" width="18" height="45" rx="4" fill="url(#shimmer)" />
          <rect x="72" y="85" width="18" height="60" rx="4" fill="url(#shimmer)" />
          <rect x="102" y="70" width="18" height="75" rx="4" fill="url(#shimmer)" />
          <rect x="132" y="92" width="18" height="53" rx="4" fill="url(#shimmer)" />

          <!-- airplane path -->
          <path d="M40 120 C75 90, 110 80, 155 55" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="6 6" fill="none" opacity="0.8">
            <animate attributeName="stroke-dashoffset" from="12" to="0" dur="1s" repeatCount="indefinite" />
          </path>

          <!-- airplane -->
          <g transform="translate(150 50) rotate(-18)">
            <path d="M0 0 L18 5 L0 10 L4 6 L-8 6 L-8 4 L4 4 Z" fill="#e5e7eb" />
          </g>

          <!-- loading label -->
          <rect x="55" y="165" width="90" height="10" rx="5" fill="url(#shimmer)" />
        </svg>